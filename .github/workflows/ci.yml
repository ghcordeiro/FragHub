name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: TypeScript type-check
  # ---------------------------------------------------------------------------
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: services/fraghub-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/fraghub-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type-check
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Job 2: ESLint
  # ---------------------------------------------------------------------------
  lint:
    name: ESLint
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: services/fraghub-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/fraghub-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Job 3: Unit tests (vitest)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: services/fraghub-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/fraghub-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: services/fraghub-api/coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4: ShellCheck (bash scripts)
  # ---------------------------------------------------------------------------
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck on installer scripts
        run: |
          find scripts/installer -name '*.sh' -print0 | \
            xargs -0 shellcheck --severity=error --shell=bash

      - name: Run ShellCheck on upgrade script
        run: shellcheck --severity=error --shell=bash scripts/upgrade.sh

  # ---------------------------------------------------------------------------
  # Job 5: BATS tests (bash installer)
  # ---------------------------------------------------------------------------
  bats-tests:
    name: BATS installer tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Run BATS tests
        run: |
          if find tests/installer -name '*.bats' | grep -q .; then
            bats tests/installer/*.bats
          else
            echo "No .bats test files found — skipping."
          fi

  # ---------------------------------------------------------------------------
  # Job 6: Build check (TypeScript compile)
  # ---------------------------------------------------------------------------
  build:
    name: Build (tsc)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: services/fraghub-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/fraghub-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify dist/index.js exists
        run: |
          [ -f dist/index.js ] || (echo "ERROR: dist/index.js not found after build" && exit 1)

  # ---------------------------------------------------------------------------
  # Job 7: Prettier format check
  # ---------------------------------------------------------------------------
  format:
    name: Prettier format check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: services/fraghub-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/fraghub-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npx prettier --check .

  # ---------------------------------------------------------------------------
  # Summary gate: all jobs must pass
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI gate
    runs-on: ubuntu-22.04
    needs:
      - typecheck
      - lint
      - unit-tests
      - shellcheck
      - bats-tests
      - build
      - format
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
